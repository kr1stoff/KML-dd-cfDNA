# conda 环境配置
conda:
  python: python3.12
  fastqc: basic
  multiqc: basic
  fastp: basic2
  bwa: basic
  samtools: basic
  bcftools: basic
  gatk: basic
  lofreq: basic
  vt: basic2

# 线程数配置
threads:
  low: 4
  medium: 8
  high: 16

# 数据库配置
database:
  # 参考基因组, 需要提前建 bwa/samtools/picard 索引
  hg19: /data/mengxf/Database/reference/hg19/hg19.fa
  gatk_dict: /data/mengxf/Database/reference/hg19/hg19.dict
  known_site_1000g: /data/mengxf/Database/GATK4/hg19/1000G_phase1.snps.high_confidence.hg19.sites.bgzip.vcf.gz
  known_site_1000g_idx: /data/mengxf/Database/GATK4/hg19/1000G_phase1.snps.high_confidence.hg19.sites.bgzip.vcf.gz.tbi
  known_site_dbsnp: /data/mengxf/Database/GATK4/hg19/dbsnp_138.hg19.bgzip.vcf.gz
  known_site_dbsnp_idx: /data/mengxf/Database/GATK4/hg19/dbsnp_138.hg19.bgzip.vcf.gz.tbi
  known_site_mills: /data/mengxf/Database/GATK4/hg19/Mills_and_1000G_gold_standard.indels.hg19.sites.bgzip.vcf.gz
  known_site_mills_idx: /data/mengxf/Database/GATK4/hg19/Mills_and_1000G_gold_standard.indels.hg19.sites.bgzip.vcf.gz.tbi
